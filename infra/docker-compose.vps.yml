services:
  apps-bezura:
    image: nginx:alpine
    container_name: apps-bezura
    restart: unless-stopped
    volumes:
      - ../infra/nginx/cadastro-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ../web/avisos-recorrente.png:/usr/share/nginx/html/avisos-recorrente.png:ro
      - ../web/modal:/usr/share/nginx/html/modal:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.apps-bezura.rule=Host(`apps.logzap.com.br`)
      - traefik.http.routers.apps-bezura.entrypoints=web,websecure
      - traefik.http.routers.apps-bezura.tls=true
      - traefik.http.routers.apps-bezura.tls.certresolver=mytlschallenge
      - traefik.http.routers.apps-bezura.priority=10
      - traefik.http.services.apps-bezura.loadbalancer.server.port=80
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
