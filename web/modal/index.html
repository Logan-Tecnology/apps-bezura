<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bezura | Biblioteca de Apps</title>
  <link rel="icon" type="image/png" href="../logan-logo.png" />
  <style>
    /* DESIGN TOKENS */
    :root {
      --bg-dark: #0a1737;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-hover: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --text-muted: #cbd5e1;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(56, 189, 248, 0.18), transparent 36%),
        radial-gradient(circle at 84% 20%, rgba(59, 130, 246, 0.22), transparent 34%),
        radial-gradient(circle at 72% 80%, rgba(14, 116, 144, 0.2), transparent 38%),
        linear-gradient(140deg, #0a1737 0%, #0c1f49 34%, #102a5f 66%, #0a1a3d 100%);
      background-size: 180% 180%;
      animation: gradientShift 18s ease-in-out infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* BACKGROUND ANIMATIONS */
    body::before {
      content: "";
      position: fixed;
      inset: -20% -10%;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(closest-side, rgba(37, 99, 235, 0.2), transparent 72%) 10% 24% / 34% 34% no-repeat,
        radial-gradient(closest-side, rgba(59, 130, 246, 0.17), transparent 72%) 82% 16% / 26% 26% no-repeat,
        radial-gradient(closest-side, rgba(30, 64, 175, 0.14), transparent 72%) 74% 76% / 31% 31% no-repeat,
        radial-gradient(closest-side, rgba(96, 165, 250, 0.12), transparent 72%) 28% 84% / 23% 23% no-repeat;
      filter: blur(12px);
      animation: blobsFloat 18s ease-in-out infinite alternate;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      opacity: 0.6;
      animation: floatUp linear infinite;
    }

    /* LIBRARY LAYOUT */
    .app-library {
      width: 100%;
      height: 100vh;
      padding: 60px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .library-header {
      position: absolute;
      top: 40px;
      right: 40px;
      text-align: right;
    }

    .library-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .library-header p {
      color: var(--text-muted);
      margin: 5px 0 0;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    /* APP GRID */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 40px;
      justify-content: center;
      align-items: start;
      max-width: 1000px;
      width: 100%;
    }

    /* APP ITEM (Wrapper) */
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s ease;
    }

    .app-item:hover {
      transform: translateY(-5px);
    }

    /* GLASS CARD */
    .app-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .app-item:hover .app-card {
      background: var(--glass-hover);
      border-color: var(--primary);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 0 20px var(--primary-glow);
    }

    /* APP ICON IMAGE */
    .app-icon-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .app-item:hover .app-icon-img {
      transform: scale(1.1);
    }

    /* APP NAME (Outside Card) */
    .app-name {
      font-weight: 600;
      font-size: 0.95rem;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.02em;
    }

    /* ANIMATIONS */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes blobsFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(3%, -2%) scale(1.05); }
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(0.2); opacity: 0; }
      30% { opacity: 0.5; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* RESPONSIVENESS */
    @media (max-width: 600px) {
      .library-header {
        position: relative;
        top: 0;
        right: 0;
        text-align: center;
        margin-bottom: 40px;
      }
      .app-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
      }
      .app-card {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="particles"></div>

  <main class="app-library">
    <header class="library-header">
      <h1>Biblioteca de aplicativos</h1>
      <p>Acesso rápido às suas ferramentas</p>
    </header>

    <div class="app-grid">
      <!-- AVISOS INTERNOS -->
      <a href="#" class="app-item">
        <div class="app-card">
          <img src="../avisos-recorrente.png" alt="Avisos Internos" class="app-icon-img">
        </div>
        <span class="app-name">Avisos Internos</span>
      </a>
    </div>
  </main>

  <script>
    function createParticles() {
      const particleContainer = document.getElementById("particles");
      const particleCount = 60;

      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement("div");
        p.classList.add("particle");

        const size = Math.random() * 4 + 1;
        const left = Math.random() * 100;
        const duration = Math.random() * 10 + 10;
        const delay = Math.random() * 10;

        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${left}%`;
        p.style.animationDuration = `${duration}s`;
        p.style.animationDelay = `-${delay}s`;

        particleContainer.appendChild(p);
      }
    }

    createParticles();
  </script>
</body>
</html>
