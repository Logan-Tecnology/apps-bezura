name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Timeout na porta 22 entre runners do GitHub e a VPS é intermitente; timeout maior + 2ª tentativa reduz ruído.
      - name: Deploy via SSH
        id: ssh_deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 3m
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${{ secrets.DEPLOY_REPO_PATH }}"
            if [ -z "$REPO" ]; then REPO=/home/vinicius/avisos-bezura; fi
            if [ ! -d "$REPO/.git" ]; then
              echo "::error::Repositório não encontrado em $REPO — clone o repo ou defina o secret DEPLOY_REPO_PATH."
              exit 1
            fi
            cd "$REPO"
            git stash push -u -m "auto-deploy-stash-$(date +%Y%m%d-%H%M%S)" || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git rev-parse --short HEAD
            docker compose -f infra/docker-compose.vps.yml up -d --build
            docker compose -f infra/docker-compose.vps.yml up -d --force-recreate apps-bezura

      - name: Deploy via SSH (retry)
        id: ssh_deploy_retry
        if: steps.ssh_deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 3m
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${{ secrets.DEPLOY_REPO_PATH }}"
            if [ -z "$REPO" ]; then REPO=/home/vinicius/avisos-bezura; fi
            if [ ! -d "$REPO/.git" ]; then
              echo "::error::Repositório não encontrado em $REPO — clone o repo ou defina o secret DEPLOY_REPO_PATH."
              exit 1
            fi
            cd "$REPO"
            git stash push -u -m "auto-deploy-stash-$(date +%Y%m%d-%H%M%S)" || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git rev-parse --short HEAD
            docker compose -f infra/docker-compose.vps.yml up -d --build
            docker compose -f infra/docker-compose.vps.yml up -d --force-recreate apps-bezura

      - name: Verificar sucesso do SSH
        if: always()
        run: |
          o1="${{ steps.ssh_deploy.outcome }}"
          o2="${{ steps.ssh_deploy_retry.outcome }}"
          if [ "$o1" = "success" ] || [ "$o2" = "success" ]; then
            echo "Deploy SSH OK (tentativa: $o1, retry: $o2)."
            exit 0
          fi
          echo "::error::SSH à VPS falhou (ex.: dial tcp :22 i/o timeout). Confirme SSH_HOST, Hetzner Cloud Firewall/UFW na porta 22, fail2ban e reexecute o workflow ou faça deploy manual na VPS."
          exit 1

      - name: Validar produção (painel + assets)
        env:
          PUBLIC_ORIGIN: https://apps.logzap.com.br
          EXPECTED_SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          dns_ip=$(getent ahosts apps.logzap.com.br | awk '/STREAM/ && $1 ~ /^[0-9]+\./{print $1; exit}')
          expected_ip=$(printf '%s' "${EXPECTED_SSH_HOST:-}" | awk -F',' '{print $1}' | tr -d '[:space:]')
          echo "DNS apps.logzap.com.br → ${dns_ip:-desconhecido}"
          echo "SSH_HOST (secret) → ${expected_ip:-desconhecido}"
          if [ -z "${dns_ip:-}" ] || [ -z "${expected_ip:-}" ]; then
            echo "::error::Não foi possível determinar DNS/IP esperado para validação."
            exit 1
          fi
          if [ "$dns_ip" != "$expected_ip" ]; then
            echo "::error::Mismatch DNS x SSH_HOST. O deploy pode ter atualizado outra máquina."
            echo "::error::Ajuste o secret SSH_HOST para $dns_ip e reexecute o workflow."
            exit 1
          fi

          modal_code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 "$PUBLIC_ORIGIN/modal/")
          asset_code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 "$PUBLIC_ORIGIN/avisos-recorrente.png")
          root_code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 "$PUBLIC_ORIGIN/")

          echo "GET /modal/ → HTTP $modal_code"
          echo "GET /avisos-recorrente.png → HTTP $asset_code"
          echo "GET / → HTTP $root_code"

          if [ "$modal_code" != "200" ] || [ "$asset_code" != "200" ]; then
            echo "::error::Produção inválida após deploy (modal/asset com status diferente de 200)."
            exit 1
          fi
          if [ "$root_code" != "200" ]; then
            echo "::warning::Raiz não retorna 200 — validar proxy/nginx e roteamento do domínio."
          fi
